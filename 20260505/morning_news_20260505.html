let currentPage = 0;
const content = document.getElementById('content');
const indicator = document.getElementById('pageIndicator');

function renderPage() {
  const p = pages[currentPage];
  let tagClass = 'tag-finance';
  if (p.type === 'politics') tagClass = 'tag-politics';
  if (p.type === 'law') tagClass = 'tag-law';
  
  content.innerHTML = `
    <div class="page active">
      <span class="category-tag ${tagClass}">${p.tag}</span>
      <h2 class="news-title">${p.title}</h2>
      <div class="news-content">${p.content}</div>
      <div class="highlight-box"><p>${p.highlight}</p></div>
    </div>
  `;
  
  indicator.innerHTML = pages.map((_, i) => 
    `<span class="dot ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})"></span>`
  ).join('');
  
  document.querySelector('.prev-btn').style.opacity = currentPage === 0 ? '0.4' : '1';
  document.querySelector('.next-btn').style.opacity = currentPage === pages.length - 1 ? '0.4' : '1';
}

function nextPage() {
  if (currentPage < pages.length - 1) {
    currentPage++;
    renderPage();
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    renderPage();
  }
}

function goToPage(idx) {
  currentPage = idx;
  renderPage();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

renderPage();
</script>
