let currentIndex = 0;

function renderCard(index) {
  const card = cards[index];
  const cardEl = document.getElementById('card');
  cardEl.innerHTML = `
    <span class="card-category ${card.category}">${card.categoryText}</span>
    <h2 class="card-title">${card.title}</h2>
    <div class="card-content">${card.content}</div>
    <div class="card-highlight">
      <p>${card.highlight}</p>
    </div>
    <div class="card-footer">
      <span class="page-indicator">${index + 1} / ${cards.length}</span>
    </div>
  `;
  
  // 更新dots
  const dotsContainer = document.getElementById('dots');
  dotsContainer.innerHTML = cards.map((_, i) => 
    `<span class="dot ${i === index ? 'active' : ''}"></span>`
  ).join('');
  
  // 更新按钮状态
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === cards.length - 1;
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard(currentIndex);
  }
}

function nextCard() {
  if (currentIndex < cards.length - 1) {
    currentIndex++;
    renderCard(currentIndex);
  }
}

// 键盘控制
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'ArrowRight') nextCard();
});

// 触摸滑动支持
let touchStartX = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
});
document.addEventListener('touchend', (e) => {
  const touchEndX = e.changedTouches[0].clientX;
  const diff = touchStartX - touchEndX;
  if (diff > 50) nextCard();
  if (diff < -50) prevCard();
});

// 初始化
renderCard(0);
</script>
