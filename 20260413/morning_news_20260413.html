        let currentIndex = 0;

        function renderNews() {
            const news = newsData[currentIndex];
            const content = document.getElementById('content');
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            content.innerHTML = `
                <div class="news-item active">
                    <span class="news-category ${news.category}">${news.categoryText}</span>
                    <h2 class="news-title">${news.title}</h2>
                    <p class="news-summary">${news.summary}</p>
                    <div class="news-source">${news.source}</div>
                </div>
            `;

            pageInfo.textContent = `${currentIndex + 1} / ${newsData.length}`;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === newsData.length - 1;
        }

        function prevNews() {
            if (currentIndex > 0) {
                currentIndex--;
                renderNews();
            }
        }

        function nextNews() {
            if (currentIndex < newsData.length - 1) {
                currentIndex++;
                renderNews();
            }
        }

        // 键盘导航
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevNews();
            if (e.key === 'ArrowRight') nextNews();
        });

        // 初始化
        renderNews();
