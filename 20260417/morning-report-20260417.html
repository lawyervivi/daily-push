let currentIndex = 0;
const container = document.getElementById('cardContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageIndicator = document.getElementById('pageIndicator');
const progress = document.getElementById('progress');

function renderCard(index) {
  const card = cards[index];
  const categoryClass = `category-${card.category}`;
  container.innerHTML = `
    <div class="card active">
      <span class="category-tag ${categoryClass}">${card.tag}</span>
      <h2 class="card-title">${card.title}</h2>
      <p class="card-content">${card.content}</p>
      <div class="card-highlight">${card.highlight}</div>
      <p class="card-source">${card.source}</p>
    </div>
  `;
  pageIndicator.textContent = `${index + 1} / ${cards.length}`;
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === cards.length - 1;
  progress.style.width = `${((index + 1) / cards.length) * 100}%`;
}

function nextCard() {
  if (currentIndex < cards.length - 1) {
    currentIndex++;
    renderCard(currentIndex);
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard(currentIndex);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
});

renderCard(0);
</script>
