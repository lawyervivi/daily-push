        let currentIndex = 0;

        function renderCard(index) {
            const card = newsData[index];
            const cardContent = document.getElementById('cardContent');
            const pageIndicator = document.getElementById('pageIndicator');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            cardContent.innerHTML = `
                <div class="category-tag category-${card.categoryClass}">${card.category} · 第${index + 1}/${newsData.length}条</div>
                <h2 class="card-title">${card.title}</h2>
                <div class="card-content">${card.content}</div>
                <div class="source-link">${card.source}</div>
            `;

            pageIndicator.textContent = `第 ${index + 1} / ${newsData.length} 条`;
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === newsData.length - 1;
        }

        function nextCard() {
            if (currentIndex < newsData.length - 1) {
                currentIndex++;
                renderCard(currentIndex);
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard(currentIndex);
            }
        }

        // 初始化
        renderCard(0);
