<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0d2137 100%);

  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 420px;
  position: relative;
}
.header {
  text-align: center;
  padding: 20px 0;
  color: #fff;
}
.header h1 {
  font-size: 24px;
  font-weight: 600;
  background: linear-gradient(90deg, #4fc3f7, #81d4fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.header .date {
  font-size: 13px;
  color: #90a4ae;
}
.header .summary {
  font-size: 12px;
  color: #78909c;
  margin-top: 6px;
}
.card-wrapper {
  position: relative;
  perspective: 1000px;
}
.card {
  background: linear-gradient(145deg, #1e3a5f 0%, #152a45 100%);
  border-radius: 16px;
  padding: 24px;
  min-height: 420px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4), 0 0 1px rgba(79,195,247,0.3);
  border: 1px solid rgba(79,195,247,0.2);
  display: flex;
  flex-direction: column;
}
.card-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 14px;
  width: fit-content;
}
.tag-caijing { background: linear-gradient(90deg, #1565c0, #1976d2); color: #fff; }
.tag-zhengwen { background: linear-gradient(90deg, #7b1fa2, #9c27b0); color: #fff; }
.tag-fazhi { background: linear-gradient(90deg, #c62828, #e53935); color: #fff; }
.card-title {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  line-height: 1.5;
  margin-bottom: 12px;
}
.card-content {
  font-size: 14px;
  color: #b0bec5;
  line-height: 1.8;
  flex: 1;
}
.card-highlight {
  background: rgba(79,195,247,0.1);
  border-left: 3px solid #4fc3f7;
  padding: 12px;
  margin: 12px 0;
  border-radius: 0 8px 8px 0;
}
.card-highlight p {
  color: #e0f7fa;
  font-size: 13px;
}
.card-link {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.card-link a {
  color: #4fc3f7;
  font-size: 12px;
  text-decoration: none;
}
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-top: 20px;
}
.pagination button {
  background: rgba(79,195,247,0.15);
  border: 1px solid rgba(79,195,247,0.3);
  color: #4fc3f7;
  padding: 10px 20px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}
.pagination button:hover {
  background: rgba(79,195,247,0.3);
}
.pagination button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.page-indicator {
  color: #78909c;
  font-size: 13px;
}
.footer {
  text-align: center;
  margin-top: 16px;
  color: #607d8b;
  font-size: 11px;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeIn 0.4s ease-out; }
</style>
</head>
<body>

    link: "http://www.gov.cn/"

];
let currentIndex = 0;
function renderCard(index) {
  const card = document.getElementById('newsCard');
  const item = newsData[index];
  card.innerHTML = `
    <span class="card-tag ${item.tagClass}">${item.tag}</span>
    <h2 class="card-title">${item.title}</h2>
    <div class="card-content">${item.content}</div>
    <div class="card-highlight"><p>${item.highlight}</p></div>
    <div class="card-link"><a href="${item.link}" target="_blank">查看原文 →</a></div>
  `;
  document.getElementById('pageIndicator').textContent = `${index+1}/${newsData.length}`;
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === newsData.length - 1;
}
function prevNews() {
  if (currentIndex > 0) { currentIndex--; renderCard(currentIndex); }
}
function nextNews() {
  if (currentIndex < newsData.length - 1) { currentIndex++; renderCard(currentIndex); }
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') prevNews();
  if (e.key === 'ArrowRight') nextNews();
});
renderCard(0);
</script>
</body>
</html>
