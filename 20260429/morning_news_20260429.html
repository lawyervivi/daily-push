let currentIndex = 0;

function renderCard(index) {
  const card = newsData[index];
  const cardInner = document.getElementById('cardInner');
  cardInner.innerHTML = `
    <div class="card-category">${card.category}</div>
    <div class="card-title">${card.title}</div>
    <div class="card-content">${card.content}</div>
    <div class="card-source">来源：${card.source}</div>
  `;
  
  // 更新dots
  const dotsContainer = document.getElementById('pageDots');
  dotsContainer.innerHTML = newsData.map((_, i) => 
    `<div class="dot ${i === index ? 'active' : ''}" onclick="goToCard(${i})"></div>`
  ).join('');
  
  // 更新按钮状态
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === newsData.length - 1;
}

function nextCard() {
  if (currentIndex < newsData.length - 1) {
    currentIndex++;
    document.getElementById('card').style.transform = 'rotateY(-10deg)';
    setTimeout(() => {
      renderCard(currentIndex);
      document.getElementById('card').style.transform = 'rotateY(0)';
    }, 100);
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    document.getElementById('card').style.transform = 'rotateY(10deg)';
    setTimeout(() => {
      renderCard(currentIndex);
      document.getElementById('card').style.transform = 'rotateY(0)';
    }, 100);
  }
}

function goToCard(index) {
  currentIndex = index;
  renderCard(currentIndex);
}

// 键盘支持
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextCard();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevCard();
});

// 初始化
renderCard(0);
</script>
